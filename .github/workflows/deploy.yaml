name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: ci
      PORT: 3000
      CHROMIUM_PATH: /usr/bin/chromium-browser

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache client node_modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: client-deps-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-deps-

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Install Chrome
        run: sudo apt-get install -y chromium-browser

      - name: Build client
        run: npm run build

      - name: Start server
        run: nohup npm run start > server.log 2>&1 &

      - name: Wait for server
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000 && break
            echo "Waiting for server... attempt $i"
            sleep 2
          done

      - name: Run tests
        run: npm test

      - name: Print server log on failure
        if: failure()
        run: cat server.log